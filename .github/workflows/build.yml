name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Busted cache key with 'v2' to force a fresh download of the Android SDK
    - name: Cache Buildozer global directory
      uses: actions/cache@v4
      with:
        path: .buildozer_global
        key: buildozer-global-v2-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          buildozer-global-v2-

    - name: Cache Buildozer directory
      uses: actions/cache@v4
      with:
        path: .buildozer
        key: ${{ runner.os }}-v2-${{ hashFiles('buildozer.spec') }}

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip3 install --user --upgrade buildozer cython virtualenv

    - name: Setup Java 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    # Notice: the setup-android step is completely removed! 
    # Buildozer is fully capable of downloading the exact SDK it needs automatically.

    - name: Build with Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        # Do not override ANDROID_SDK_ROOT so Buildozer uses its internal one!
        buildozer android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: calorie-tracker-apk
        path: bin/*.apk
